name: Deploy Frontend to EC2

on:
  push:
    branches:
      - deploy # El pipeline se activa al hacer push a esta rama (Requisito de la pauta)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen (Build and Push)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest

      - name: Desplegar en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_FRONT_IP }}
          username: ec2-user # o ssm-user dependiendo de tu AMI
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo docker stop frontend-app || true
            sudo docker rm frontend-app || true
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest
            sudo docker run -d -p 80:80 --name frontend-app ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest
 
